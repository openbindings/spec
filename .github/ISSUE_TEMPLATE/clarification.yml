name: Spec clarification
description: Something in the spec is ambiguous or unclear
labels: ["clarification"]
body:
  - type: input
    id: section
    attributes:
      label: Section
      description: Which section of the spec does this relate to?
      placeholder: "e.g., Schema Comparison Rules, Discovery, Transforms"
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: What's unclear?
      description: Describe the ambiguity and what you expected the spec to say.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Are you implementing the spec? Which language/tool? What decision does this block?
