name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # needed for the snapshot-immutability diff against the PR base

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate examples against schema
        run: |
          for f in examples/*.obi.json; do
            echo "Validating $f..."
            ajv validate -s openbindings.schema.json -d "$f" --spec=draft2020 -c ajv-formats
          done

      - name: Check canonical field ordering
        run: |
          node scripts/check-canonical-order.mjs examples/*.obi.json

      - name: Validate operation-graph schema is valid JSON
        run: python3 -m json.tool binding-specs/operation-graph/openbindings.operation-graph.schema.json > /dev/null

      - name: Verify operation-graph examples and conformance subcorpus
        run: node scripts/verify-operation-graph.mjs

      - name: Run operation-graph reference runner (executes execution fixtures)
        run: |
          cd conformance/operation-graph/runners/js
          npm install --no-audit --no-fund
          node run.mjs

      - name: Run operation-graph reference runner (adversarial interleavings)
        run: |
          cd conformance/operation-graph/runners/js
          node run.mjs --adversarial --trials=512

      - name: Verify binding-specs conformance subcorpus
        run: node scripts/verify-binding-specs.mjs

      - name: Verify binding-specification publications
        run: |
          base=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base="${{ github.event.before }}"
          fi
          if [ -n "$base" ]; then
            node scripts/verify-binding-spec-publications.mjs --base "$base"
          else
            node scripts/verify-binding-spec-publications.mjs
          fi

      - name: Exercise binding-specification publication lifecycle
        run: node scripts/test-binding-spec-publication-lifecycle.mjs

      - name: Verify conformance corpus consistency
        run: node scripts/verify-corpus.mjs

      - name: Check conformance manifest is up-to-date
        run: |
          node scripts/generate-conformance-manifest.mjs
          git diff --exit-code conformance/manifest.json

      - name: Verify release snapshot layout
        run: node scripts/verify-release-snapshot.mjs

      - name: Enforce immutability of released snapshots
        # Released snapshots under versions/X.Y.Z/ are immutable
        # (RELEASING.md Principles; CONTRIBUTING.md): a PR may only ADD
        # files there (a new release's snapshot). versions/README.md is the
        # one mutable file — its index gains an entry per release.
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          violations=$(git diff --no-renames --name-status "$base"...HEAD -- versions/ | awk -F'\t' '$1 != "A" && $2 != "versions/README.md" { print }')
          if [ -n "$violations" ]; then
            echo "::error::Released snapshots are immutable; these files under versions/ were changed:"
            echo "$violations"
            echo "Corrections to released text ship as errata in the next release (RELEASING.md)."
            exit 1
          fi
          echo "no released snapshot files changed"

      - name: Enforce immutability of binding-specification publications
        # Publication bundles and individual errata are append-only. The
        # manifests may gain entries; the verifier above proves every existing
        # entry remains byte-equivalent to the PR or pre-push base.
        run: |
          base=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ]; then
            echo "no historical base is available; current publication integrity was verified"
            exit 0
          fi
          bundle_violations=$(git diff --no-renames --name-status "$base"...HEAD -- binding-specs/releases/ | awk -F'\t' '$1 != "A" { print }')
          errata_violations=$(git diff --no-renames --name-status "$base"...HEAD -- binding-specs/errata/ | awk -F'\t' '$1 != "A" && $2 != "binding-specs/errata/README.md" { print }')
          if [ -n "$bundle_violations" ] || [ -n "$errata_violations" ]; then
            echo "::error::Published binding-specification bundles and errata are immutable:"
            echo "$bundle_violations"
            echo "$errata_violations"
            echo "Publish a new binding-specification revision or append a new erratum."
            exit 1
          fi
          echo "no published binding-specification artifact changed"

      - name: Check local markdown links
        run: |
          rc=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            grep -oP '\[(?:[^\]]*)\]\(\K[^)#][^)]*?\.(?:md|json|yaml|yml)' "$file" 2>/dev/null | while IFS= read -r target; do
              case "$target" in http://*|https://*) continue;; esac
              target_file="${target%%#*}"
              resolved="$dir/$target_file"
              if [ ! -f "$resolved" ]; then
                echo "BROKEN LINK: $file -> $target (resolved: $resolved)"
                exit 1
              fi
            done || rc=1
          done < <(find . -name '*.md' -not -path '*/node_modules/*' -not -path './versions/*' -not -path './temp_ref/*')
          exit $rc
