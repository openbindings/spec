  # ---- Profile / engine kinds (findings.md §8) ----

  - { kind: profile.schema.invalid_type_array,        description: "A schema declares `type` as an empty array or contains a non-2020-12 value.",                                                                                  categories: [structural], severity: error, modes: [all] }
  - { kind: profile.schema.not_2020_12,               description: "A schema does not conform to JSON Schema 2020-12 (e.g., uses draft-04 boolean exclusiveMinimum).",                                                              categories: [structural], severity: error, modes: [all] }
  - { kind: profile.schema.unsupported_keyword,       description: "A schema uses a keyword the profile does not understand; subsumption may be incomplete.",                                                                       categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.schema.profile_version_mismatch,  description: "One side declares a JSON Schema dialect not supported by the OB-2020-12 profile.",                                                                              categories: [structural], severity: error, modes: [all] }
  - { kind: profile.ref.resolution_failed,            description: "A `$ref` could not be resolved; subsumption was abandoned for that branch.",                                                                                    categories: [structural], severity: error, modes: [all] }
  - { kind: profile.ref.cycle_depth_exceeded,         description: "Reference traversal exceeded the cycle-depth bound.",                                                                                                            categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.schema.vocabulary_present,        description: "A schema declares `$vocabulary` (forbidden by OBI-D-08).",                                                                                                       categories: [structural], severity: error, modes: [all] }
  - { kind: profile.suppressions.rule_expired,        description: "A suppression rule's `until:` timestamp has passed; the rule is not applied.",                                                                                  categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.format_version_mismatch,          description: "A consumer is reading a report whose `format_version` differs from the consumer's expected version; best-effort interpretation may be lossy.",                  categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.policy.tag_unknown,               description: "A `--policy=<file>` declared a tag the catalog's activation map does not recognize; the tag is preserved but does not activate any compliance dimension.",      categories: [structural], severity: info,  modes: [all] }
  - { kind: profile.kind_unknown,                     description: "A finding's `kind` slug is not in the catalog and does not carry a recognized vendor namespace; consumers see the kind verbatim and SHOULD treat severity as `info`.", categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.timeout_exceeded,                 description: "Comparison run hit the configured timeout; the report's verdict is `unverified` for any operation not yet fully evaluated.",                                       categories: [structural], severity: warn,  modes: [all] }
  - { kind: profile.alias.cycle,                      description: "A graph cycle was detected during alias-based operation pairing or `satisfies` resolution; the affected branch is not paired.",                                     categories: [structural], severity: error, modes: [all] }
  - { kind: profile.kind_translated,                  description: "A suppression rule referenced a kind that was translated via the catalog's top-level `aliases:` table; the new slug applies.",                                      categories: [structural], severity: info,  modes: [all] }

# Compliance activation map (findings.md §9)
# Tag-driven: kind activates `compliance` when the affected field has the tag.
compliance_activation:
  field.added:                        any_x_policy
  field.removed:                      any_x_policy
  required.added:                     x-policy-sensitive
  required.required_to_optional:      x-policy-sensitive
  string.pattern.added:                x-policy-sensitive
  string.pattern.removed:              x-policy-sensitive
  enum.value.removed:                  x-policy-sensitive
  enum.value.added:                    x-policy-sensitive

# Slug-rename aliases. Empty at v1; populated when a kind is renamed in a
# minor catalog bump. Map old slug → current slug. Entries are preserved
# indefinitely; consumers using a legacy slug receive a `profile.kind_translated`
# info finding plus the translated behavior.
aliases: {}

