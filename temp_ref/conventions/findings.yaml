  - { kind: field.removed,                    description: "A field was removed from the schema.",                                                                                                          categories: [breaking],     severity: error, modes: [all] }
  - { kind: field.deprecated.changed,    description: "The `deprecated` flag changed on a field.",                                                                                                    categories: [non_breaking], severity: warn,  modes: [all] }
  - { kind: field.default.changed,            description: "A `default` value changed.",                                                                                                                   categories: [non_breaking], severity: warn,  modes: [all] }
  - { kind: metadata.changed,                 description: "A purely descriptive metadata value changed (description, title, examples, comment, tags, or other annotation-only keyword). The pointer identifies which field changed; `before`/`after` carry the values.", categories: [structural], severity: info,  modes: [all] }

