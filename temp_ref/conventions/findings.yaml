# OpenBindings comparison finding catalog (v1)
# Companion to findings.md; this file is the implementation source-of-truth.
# Go SDK, TS SDK, and the conformance corpus runner consume this file directly.
# CI verifies findings.md and this file stay in sync.
#
# Schema: see comparison.md §9 for field definitions.

catalog_version: v1
convention_version: v1
profile: OB-2020-12

categories: [breaking, non_breaking, compliance, structural]
severities: [info, warn, error]
modes: [subsume, equivalent, identical]

kinds:

  # ---- Pairing kinds (findings.md §5) ----

  - kind: pair.unknown_role
    description: A satisfies claim references a role not declared in the document's roles map.
    categories: [structural]
    severity: error
    modes: [all]

  - kind: pair.unknown_operation
    description: A satisfies claim references an operation not present in the role document.
    categories: [structural]
    severity: error
    modes: [all]

  - kind: pair.ambiguous
    description: Multiple matching strategies produced different pairings; the engine selected the highest-priority one but the ambiguity suggests a document defect.
    categories: [structural]
    severity: error
    modes: [all]

  - kind: operation.added
    description: An operation present only in the right side; the right has surface area not in the contract.
    categories: [non_breaking]
    severity: info
    modes: [all]

  - kind: operation.removed
    description: An operation present only in the left side (the contract); no counterpart in the right.
    categories: [breaking]
    severity: error
    modes: [all]

  # ---- Subsumption kinds (findings.md §6) ----

  # 6.1 Type-set
  - { kind: type.set.narrowed,            description: "The schema's type set is strictly smaller than the contract's; values valid for the contract may be rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: type.set.widened,             description: "The schema's type set is strictly larger than the contract's; values not promised by the contract may appear.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: required.added,               description: "A required property is required by the schema but not by the contract.",                                       categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: required.removed,             description: "A property required by the contract is not required by the schema.",                                            categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: required.optional_to_required, description: "An optional property in the contract became required in the schema.",                                          categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: required.required_to_optional, description: "A required property in the contract became optional in the schema.",                                           categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: type.integer_to_number,        description: "A type widened from `integer` to `number`; non-integers may appear.",                                          categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: type.number_to_integer,        description: "A type narrowed from `number` to `integer`; floats no longer accepted.",                                       categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }

  # 6.2 Numeric bounds
  - { kind: numeric.minimum.tightened,        description: "A numeric `minimum` increased; values previously accepted are now rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: numeric.minimum.loosened,         description: "A numeric `minimum` decreased; new lower values are now accepted.",           categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: numeric.maximum.tightened,        description: "A numeric `maximum` decreased; values previously accepted are now rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: numeric.maximum.loosened,         description: "A numeric `maximum` increased.",                                              categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: numeric.exclusive_bound.changed,  description: "A numeric bound's exclusivity flipped (inclusive vs exclusive).",             categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: numeric.multiple_of.changed,      description: "A `multipleOf` constraint changed in a way not strictly tighter or looser.",  categories: [breaking],     severity: error, modes: [subsume, equivalent] }

  # 6.3 String bounds
  - { kind: string.min_length.tightened,  description: "`minLength` increased; shorter strings are now rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: string.min_length.loosened,   description: "`minLength` decreased.",                                   categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: string.max_length.tightened,  description: "`maxLength` decreased; longer strings are now rejected.",  categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: string.max_length.loosened,   description: "`maxLength` increased.",                                   categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: string.pattern.added,         description: "A `pattern` constraint was added; some previously valid strings may be rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: string.pattern.removed,       description: "A `pattern` constraint was removed.",                      categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: string.pattern.modified,      description: "A `pattern` was modified to a non-equal regex; subsumption is unverified (see `unverified.regex_containment`).", categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: string.format.added,          description: "A `format` constraint was added; under format-assertion mode this restricts the value space. (Requires `--assert-format`.)", categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: string.format.removed,        description: "A `format` constraint was removed. (Requires `--assert-format`.)",                                                          categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: string.format.incompatible,   description: "A `format` value changed to a disjoint or non-subsuming format per the format vocabulary (e.g., `ipv4` → `ipv6`, `email` → `uri`). (Requires `--assert-format`.)", categories: [breaking], severity: error, modes: [subsume, equivalent] }

  # 6.4 Array
  - { kind: array.items.narrowed,         description: "The `items` schema became more restrictive; previously valid arrays may be rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.items.widened,          description: "The `items` schema became less restrictive.",                                          categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: array.prefix_items.narrowed,  description: "A `prefixItems` entry became more restrictive at a given position.",                  categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.prefix_items.widened,   description: "A `prefixItems` entry became less restrictive.",                                      categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: array.min_items.tightened,    description: "`minItems` increased.",                                                               categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.min_items.loosened,     description: "`minItems` decreased.",                                                               categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: array.max_items.tightened,    description: "`maxItems` decreased.",                                                               categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.max_items.loosened,     description: "`maxItems` increased.",                                                               categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: array.unique_items.enabled,   description: "`uniqueItems` was set to true; arrays with duplicates are now rejected.",             categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.unique_items.disabled,  description: "`uniqueItems` was set to false.",                                                     categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: array.contains.added,         description: "A `contains` constraint was added.",                                                  categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: array.contains.removed,       description: "A `contains` constraint was removed.",                                                categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }

  # 6.5 Object
  - { kind: object.additional_properties.disabled, description: "`additionalProperties` became `false`; previously accepted extra properties are now rejected.", categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: object.additional_properties.enabled,  description: "`additionalProperties` became `true` (or absent).",                                              categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: object.property_names.added,           description: "A `propertyNames` constraint was added.",                                                        categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: object.property_names.removed,         description: "A `propertyNames` constraint was removed.",                                                      categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: object.dependent_required.added,       description: "A `dependentRequired` constraint was added.",                                                    categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: object.dependent_required.removed,     description: "A `dependentRequired` constraint was removed.",                                                  categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: object.min_properties.tightened,       description: "`minProperties` increased.",                                                                     categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: object.min_properties.loosened,        description: "`minProperties` decreased.",                                                                     categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: object.max_properties.tightened,       description: "`maxProperties` decreased.",                                                                     categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: object.max_properties.loosened,        description: "`maxProperties` increased.",                                                                     categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }

  # 6.6 Mode-gated
  - kind: identical.subsumption_only
    description: The schema is `compatible` (subsumes correctly) but not `identical` (post-normalization equivalence). Fires under `--mode=identical` to flag the failure surface that subsumption-only modes pass silently.
    categories: [breaking]
    severity: error
    modes: [identical]

  # 6.7 Enum / const
  - { kind: enum.value.removed,        description: "A value was removed from an `enum`.",                                          categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: enum.value.added,          description: "A value was added to an `enum`.",                                              categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: const.changed,             description: "A `const` value changed.",                                                     categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: enum.collapsed_to_const,   description: "An `enum` of multiple values was reduced to a single-value `const`.",          categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: const.expanded_to_enum,    description: "A `const` was replaced by an `enum` containing additional values.",            categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }

  # 6.8 Combinators
  - { kind: oneof.pairing.failed,      description: "`oneOf` branches could not be paired by subsumption (see `unverified.combinator_pairing`).",                   categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: anyof.pairing.failed,      description: "`anyOf` branches could not be paired by subsumption.",                                                          categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: allof.branch.added,        description: "An `allOf` branch was added; the schema is strictly more constrained.",                                         categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: allof.branch.removed,      description: "An `allOf` branch was removed; the schema is less constrained.",                                                categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: not.subsumption.flipped,   description: "A `not` schema's inner subsumption is undecidable in this position; see `unverified.combinator_pairing`.",      categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }

  # 6.9 Conditionals
  - { kind: conditional.if.differs,        description: "The `if` schemas of two conditionals are not byte-identical; subsumption is unverified (see `unverified.conditional_not_byte_equal`).",  categories: [non_breaking], severity: warn,  modes: [subsume, equivalent] }
  - { kind: conditional.then.incompatible, description: "When the `if` schemas match, the `then` branches are incompatible.",                       categories: [breaking],     severity: error, modes: [subsume, equivalent] }
  - { kind: conditional.else.incompatible, description: "When the `if` schemas match, the `else` branches are incompatible.",                       categories: [breaking],     severity: error, modes: [subsume, equivalent] }

  # 6.10 Unverified outcomes (severity escalates to error under --strict-undecidable)
  - { kind: unverified.external_ref,                description: "Subsumption depends on a `$ref` the engine did not resolve (external document).",                                      categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.cycle_depth,                 description: "Subsumption traversal hit the cycle-depth bound without resolving.",                                                  categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.regex_containment,           description: "Pattern subsumption beyond byte-equality is not decided by the profile.",                                              categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.combinator_pairing,          description: "`oneOf` / `anyOf` branches could not be paired soundly.",                                                              categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.conditional_not_byte_equal,  description: "`if`/`then`/`else` schemas with non-byte-equal `if` schemas.",                                                         categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.dynamic_ref_external,        description: "A `$dynamicRef` resolves outside the current document.",                                                                categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }
  - { kind: unverified.unsupported_keyword,         description: "The schema uses a keyword the profile does not recognize.",                                                            categories: [non_breaking], severity: warn, modes: [subsume, equivalent] }

